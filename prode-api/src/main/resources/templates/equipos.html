<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Equipos - Panel Administrador</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/dashboard-home.css">
    <link rel="stylesheet" href="/css/equipos.css">
    <link rel="stylesheet" href="/css/admin-ui.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">

            <i class="bi bi-trophy-fill"></i>

            <div>

                <h2>PREDICTA</h2>

                <span>ADMINISTRADOR</span>

            </div>

        </div>

        <nav>

            <a href="/admin" class="menu">
                <i class="bi bi-house-fill"></i>
                Dashboard
            </a>

            <a href="/admin/equipos" class="menu active">
                <i class="bi bi-flag-fill"></i>
                Equipos
            </a>

            <a href="/admin/grupos" class="menu">
                <i class="bi bi-diagram-3-fill"></i>
                Grupos
            </a>

            <a href="/admin/partidos" class="menu">
                <i class="bi bi-calendar-event-fill"></i>
                Partidos
            </a>

            <a href="/admin/resultados" class="menu">
                <i class="bi bi-trophy-fill"></i>
                Resultados
            </a>

            <a href="/admin/fases" class="menu">
                <i class="bi bi-arrow-repeat"></i>
                Fases
            </a>

            <a href="/ranking" class="menu">
                <i class="bi bi-bar-chart-fill"></i>
                Ranking
            </a>

        </nav>

        <a href="#" id="logout" class="logout">

            <i class="bi bi-box-arrow-right"></i>

            Cerrar sesión

        </a>

    </aside>

    <button id="toggleSidebar" class="toggle-sidebar">

        <i class="bi bi-list"></i>

    </button>

    <!-- CONTENIDO -->

    <main class="content">

        <!-- HERO -->

        <section class="hero-card">

            <div class="hero-left">

                <div class="hero-icon">

                    <i class="bi bi-flag-fill"></i>

                </div>

                <div>

                    <h1>Gestión de Equipos</h1>

                    <p>
                        Creá, editá y administrá las selecciones del Mundial 2026.
                    </p>

                </div>

            </div>

            <div class="hero-right">

                <button class="btn-primary" id="btnNuevoEquipo">

                    <i class="bi bi-plus-circle-fill"></i>

                    Nuevo Equipo

                </button>

            </div>

        </section>



        <!-- TOOLBAR -->

        <section class="toolbar">

            <div class="search-box">

                <i class="bi bi-search"></i>

                <input
                        id="buscarEquipo"
                        type="text"
                        placeholder="Buscar equipo...">

            </div>

            <div class="filter-box">

                <button class="btn-filter">

                    <i class="bi bi-funnel"></i>

                    Todos los grupos

                    <i class="bi bi-chevron-down"></i>

                </button>

            </div>

        </section>



        <!-- LISTADO -->

        <section class="equipos-card">

            <div class="equipos-header">

                <div>Bandera</div>

                <div>Equipo</div>

                <div>FIFA</div>

                <div>Grupo</div>

                <div>Acciones</div>

            </div>

            <div id="tablaEquipos">

                <!-- equipos.js -->

            </div>

        </section>



        <!-- FOOTER -->

        <section class="footer-listado">

            <span id="contadorEquipos">

                Mostrando 0 equipos

            </span>

            <div class="pagination">

                <button>

                    <i class="bi bi-chevron-left"></i>

                </button>

                <button class="active">1</button>

                <button>2</button>

                <button>3</button>

                <button>

                    <i class="bi bi-chevron-right"></i>

                </button>

            </div>

        </section>

    </main>

</div>

<!-- ========================= MODAL ========================= -->

<div class="modal-overlay" id="modalEquipo">

    <div class="modal">

        <div class="modal-header">

            <h2 id="tituloModal">

                Nuevo Equipo

            </h2>

            <button id="cerrarModal">

                <i class="bi bi-x-lg"></i>

            </button>

        </div>

        <form id="formEquipo">

            <input
                    type="hidden"
                    id="idEquipo">

            <div class="campo">

                <label>

                    Nombre

                </label>

                <input
                        id="nombre"
                        required
                        maxlength="50">

            </div>

            <div class="campo">

                <label>

                    Código FIFA

                </label>

                <input
                        id="codigoFifa"
                        maxlength="3"
                        style="text-transform:uppercase"
                        required>

            </div>

            <div class="campo">

                <label>

                    Grupo

                </label>

                <select id="grupo">

                </select>

            </div>

            <div class="campo">

                <label>

                    Bandera

                </label>

                <input
                        type="file"
                        id="bandera"
                        accept=".png,.jpg,.jpeg">

            </div>

            <div class="preview">

                <img
                        id="previewBandera"
                        src="/img/no-image.png">

            </div>

            <div class="acciones">

                <button
                        type="button"
                        class="btn-cancelar"
                        id="btnCancelar">

                    Cancelar

                </button>

                <button
                        class="btn-guardar"
                        type="submit">

                    <i class="bi bi-check-circle-fill"></i>

                    Guardar

                </button>

            </div>

        </form>

    </div>

</div>

<script src="/js/equipos.js"></script>

<script src="/js/app.js"></script>

</body>

</html>
