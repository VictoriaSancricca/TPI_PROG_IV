<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Predicta - Mundial 2026</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/dashboard-home.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<div class="layout">

    <aside class="sidebar">

        <div class="logo">
            <i class="bi bi-trophy-fill"></i>
            <div>
                <h2>PREDICTA</h2>
                <span>MUNDIAL 2026</span>
            </div>
        </div>

        <nav>

            <a href="/dashboard" class="menu active">
                <i class="bi bi-house-fill"></i>
                Inicio
            </a>

            <a href="/partidos-view" class="menu">
                <i class="bi bi-dribbble"></i>
                Partidos
            </a>

            <a href="/mis-pronosticos" class="menu">
                <i class="bi bi-bullseye"></i>
                Mis Pronósticos
            </a>

            <a href="/ranking" class="menu">
                <i class="bi bi-trophy"></i>
                Ranking
            </a>

            <a href="/perfil" class="menu">
                <i class="bi bi-person-fill"></i>
                Perfil
            </a>

            <a href="/reglas" class="menu">
                <i class="bi bi-file-earmark-text-fill"></i>
                Reglas
            </a>

        </nav>

        <a href="#" class="logout" id="logout">
            <i class="bi bi-box-arrow-right"></i>
            Cerrar sesión
        </a>

    </aside>

    <button id="toggleSidebar" class="toggle-sidebar">
        <i class="bi bi-list"></i>
    </button>

    <main class="content">

        <div class="header">

            <div>
                <h1 id="saludo">¡Hola! 👋</h1>
                <p>Bienvenida a Predicta 2026</p>
                <p class="fraseDashboard">
                    "Cada partido es una nueva oportunidad."
                </p>
            </div>

        </div>

        <section class="cards">

            <div class="card">
                <i class="bi bi-trophy"></i>
                <div>
                    <span>Mi posición: </span>
                    <h2 id="miPosicion">-</h2>
                </div>
            </div>

            <div class="card">
                <i class="bi bi-star-fill"></i>
                <div>
                    <span>Mis puntos: </span>
                    <h2 id="misPuntos">0</h2>
                </div>
            </div>

            <div class="card">
                <i class="bi bi-bullseye"></i>
                <div>
                    <span>Pronósticos exactos: </span>
                    <h2 id="misPlenos">0</h2>
                </div>
            </div>

        </section>

        <div class="dashboard-grid">

            <section class="matches">

                <div class="section-header">

                    <h2>Próximos partidos</h2>

                    <a href="/partidos-view">Ver todos</a>

                </div>

                <div id="partidosContainer"></div>

            </section>

            <section class="ranking">

                <div class="section-header">

                    <h2>Ranking General</h2>

                    <a href="/ranking">Ver ranking</a>

                </div>

                <div id="rankingContainer"></div>

            </section>

        </div>

    </main>

</div>

<script src="/js/config.js"></script>
<script src="/js/dashboard.js"></script>
<script src="/js/app.js"></script>


</body>
</html>
