<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Predicta - Mundial 2026</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/perfil.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>

<div class="layout">

    <aside class="sidebar">

        <div class="logo">
            <i class="bi bi-trophy-fill"></i>
            <div>
                <h2>PREDICTA</h2>
                <span>MUNDIAL 2026</span>
            </div>
        </div>

        <nav>

            <a href="/dashboard" class="menu active">
                <i class="bi bi-house-fill"></i>
                Inicio
            </a>

            <a href="/partidos-view" class="menu">
                <i class="bi bi-dribbble"></i>
                Partidos
            </a>

            <a href="/mis-pronosticos" class="menu">
                <i class="bi bi-bullseye"></i>
                Mis Pronósticos
            </a>

            <a href="/ranking" class="menu">
                <i class="bi bi-trophy"></i>
                Ranking
            </a>

            <a href="/perfil" class="menu">
                <i class="bi bi-person-fill"></i>
                Perfil
            </a>

            <a href="/reglas" class="menu">
                <i class="bi bi-file-earmark-text-fill"></i>
                Reglas
            </a>

        </nav>

        <a href="#" class="logout" id="logout">
            <i class="bi bi-box-arrow-right"></i>
            Cerrar sesión
        </a>

    </aside>

    <button id="toggleSidebar" class="toggle-sidebar">
        <i class="bi bi-list"></i>
    </button>

    <main class="content">

        <!-- CABECERA -->

        <div class="header">

            <div>

                <h1>👤 Mi Perfil</h1>
                <p>Información de tu cuenta de Predicta Mundial 2026.</p>

            </div>

        </div>


        <!-- ESTADISTICAS -->

        <section class="cards">

            <div class="card">

                <i class="bi bi-star-fill"></i>

                <div>

                    <span>Puntos Totales</span>

                    <h2 id="perfilPuntos"></h2>

                </div>

            </div>

            <div class="card">

                <i class="bi bi-bullseye"></i>

                <div>

                    <span>Pronósticos Exactos</span>

                    <h2 id="perfilPlenos"></h2>

                </div>

            </div>

        </section>


        <!-- DATOS -->

        <section class="matches">

            <div class="section-title">

                Información Personal

            </div>

            <div class="perfil-card">

                <div class="avatar">

                    <i class="bi bi-person-circle"></i>

                </div>

                <div class="perfil-info">

                    <div class="info-item">

                        <label>Nombre</label>

                        <div class="info-value" id="perfilNombre"></div>

                    </div>

                    <div class="info-item">

                        <span>Correo electrónico</span>

                        <h3 id="perfilEmail"></h3>

                    </div>

                </div>

            </div>

        </section>

    </main>

</div>

<script src="/js/perfil.js"></script>
<script src="/js/app.js"></script>
<script src="/js/config.js"></script>

</body>

</html>
