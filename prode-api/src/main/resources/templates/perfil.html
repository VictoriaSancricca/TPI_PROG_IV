<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Predicta - Mundial 2026</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<div class="layout">

    <aside class="sidebar">

        <div class="logo">
            <i class="bi bi-trophy-fill"></i>
            <div>
                <h2>PREDICTA</h2>
                <span>MUNDIAL 2026</span>
            </div>
        </div>

        <nav>

            <a href="/dashboard" class="menu active">
                <i class="bi bi-house-fill"></i>
                Inicio
            </a>

            <a href="/partidos-view" class="menu">
                <i class="bi bi-dribbble"></i>
                Partidos
            </a>

            <a href="/mis-pronosticos" class="menu">
                <i class="bi bi-bullseye"></i>
                Mis Pronósticos
            </a>

            <a href="/ranking" class="menu">
                <i class="bi bi-trophy"></i>
                Ranking
            </a>

            <a href="/perfil" class="menu">
                <i class="bi bi-person-fill"></i>
                Perfil
            </a>

            <a href="/reglas" class="menu">
                <i class="bi bi-file-earmark-text-fill"></i>
                Reglas
            </a>

        </nav>

        <a href="#" class="logout" id="logout">
            <i class="bi bi-box-arrow-right"></i>
            Cerrar sesión
        </a>

    </aside>

    <button id="toggleSidebar" class="toggle-sidebar">
        <i class="bi bi-list"></i>
    </button>

    <main class="content">

        <div class="header">

            <div>
                <h1>👤 Mi Perfil</h1>
                <p>Información de tu cuenta</p>
            </div>

            <img src="/img/world-cup.png" class="cup">

            <div class="timer">
                <small>Cierre de pronósticos</small>
                <h2>02 : 15 : 43</h2>
            </div>

            <div class="user-box">
                <i class="bi bi-person-circle"></i>
                <div>
                    <strong id="nombreUsuario"></strong>
                    <small>Nivel 5 ⭐</small>
                </div>
            </div>

        </div>

        <section class="matches">

            <div class="section-title">

                Información Personal

            </div>

            <div class="match-card">

                <p><strong>Nombre:</strong> <span id="perfilNombre"></span></p>

                <p><strong>Email:</strong> <span id="perfilEmail"></span></p>

                <p><strong>Puntos:</strong> <span id="perfilPuntos"></span></p>

                <p><strong>Plenos:</strong> <span id="perfilPlenos"></span></p>

            </div>

        </section>

    </main>

</div>

<script src="/js/perfil.js"></script>
<script src="/js/app.js"></script>

</body>
</html>
