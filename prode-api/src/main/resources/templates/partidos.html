<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Predicta - Mundial 2026</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/partido.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<div class="layout">

    <aside class="sidebar">

        <div class="logo">
            <i class="bi bi-trophy-fill"></i>
            <div>
                <h2>PREDICTA</h2>
                <span>MUNDIAL 2026</span>
            </div>
        </div>

        <nav>

            <a href="/dashboard" class="menu active">
                <i class="bi bi-house-fill"></i>
                Inicio
            </a>

            <a href="/partidos-view" class="menu">
                <i class="bi bi-dribbble"></i>
                Partidos
            </a>

            <a href="/mis-pronosticos" class="menu">
                <i class="bi bi-bullseye"></i>
                Mis Pronósticos
            </a>

            <a href="/ranking" class="menu">
                <i class="bi bi-trophy"></i>
                Ranking
            </a>

            <a href="/perfil" class="menu">
                <i class="bi bi-person-fill"></i>
                Perfil
            </a>

            <a href="/reglas" class="menu">
                <i class="bi bi-file-earmark-text-fill"></i>
                Reglas
            </a>

        </nav>

        <a href="#" class="logout" id="logout">
            <i class="bi bi-box-arrow-right"></i>
            Cerrar sesión
        </a>

    </aside>

    <button id="toggleSidebar" class="toggle-sidebar">
        <i class="bi bi-list"></i>
    </button>

    <main class="content">

        <div class="header">

            <div>
                <h1>⚽ Partidos</h1>
                <p>Todos los partidos del Mundial 2026</p>
            </div>

        </div>

        <section class="matches">

            <div class="section-header">

                <h2>Todos los partidos</h2>

                <button class="btn-filtro">

                    <i class="bi bi-funnel"></i>

                    Todas las fechas

                </button>

            </div>

            <div id="partidosContainer"></div>
            <div id="paginacion" class="paginacion"></div>
        </section>

    </main>

</div>
<div id="modalPronostico" class="modal">

    <div class="modal-content">

        <h2>Nuevo Pronóstico</h2>

        <p id="tituloPartido"></p>

        <div class="marcador">

            <input
                    type="number"
                    id="golesLocal"
                    min="0"
                    max="20">

            <span>VS</span>

            <input
                    type="number"
                    id="golesVisitante"
                    min="0"
                    max="20">

        </div>

        <div class="acciones-modal">

            <button id="btnCancelarPronostico">

                Cancelar

            </button>

            <button id="btnGuardarPronostico">

                Guardar

            </button>

        </div>

    </div>

</div>
<script src="/js/partidos.js"></script>
<script src="/js/app.js"></script>

</body>
</html>
